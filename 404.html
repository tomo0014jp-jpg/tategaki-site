<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="theme-color" content="#c87a30">
<meta name="robots" content="noindex">
<title>ページが見つかりません — TateGaki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-bg: #faf8f5;
    --color-text: #2c2420;
    --color-heading: #1a1210;
    --color-accent: #c87a30;
    --color-border: #e0d5c8;
    --color-muted: #8a7e72;
    --font-sans: 'Noto Sans JP', sans-serif;
    --font-serif: 'Noto Serif JP', serif;
  }

  :focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .logo {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--color-heading);
    text-decoration: none;
    margin-bottom: 32px;
  }

  .logo span { color: var(--color-accent); }

  .code {
    font-family: var(--font-serif);
    font-size: 64px;
    font-weight: 700;
    color: var(--color-accent);
    line-height: 1;
    margin-bottom: 12px;
  }

  h1 {
    font-family: var(--font-serif);
    font-size: 20px;
    color: var(--color-heading);
    margin-bottom: 12px;
  }

  p { color: var(--color-muted); font-size: 15px; margin-bottom: 28px; }

  .home-link {
    display: inline-block;
    background: var(--color-accent);
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 999px;
    font-size: 15px;
    transition: background 0.2s, transform 0.2s;
  }

  .home-link:hover { background: #b06a26; transform: translateY(-1px); }

  .sub-links { margin-top: 24px; font-size: 13px; }
  .sub-links a { color: var(--color-muted); text-decoration: none; margin: 0 10px; }
  .sub-links a:hover { color: var(--color-text); }
</style>
</head>
<body>
  <a href="/" class="logo">Tate<span>Gaki</span></a>
  <div class="code">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動または削除された可能性があります。</p>
  <a href="/" class="home-link">ホームへ戻る</a>
  <p class="sub-links">
    <a href="/support.html">サポート</a>
    <a href="/en/">English</a>
  </p>
</body>
</html>
